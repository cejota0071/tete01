<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sem conexão — QG Marmitas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Sora', sans-serif;
      background: #0f0600;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      overflow: hidden;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    .blob-1 { width: 400px; height: 400px; background: #e85d04; top: -100px; left: -100px; }
    .blob-2 { width: 300px; height: 300px; background: #f48c06; bottom: -80px; right: -80px; }

    .emoji {
      font-size: 5rem;
      animation: float 3s ease-in-out infinite;
      margin-bottom: 1.5rem;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #e85d04;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1rem;
      color: #c9a882;
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(232, 93, 4, 0.12);
      border: 1px solid rgba(232, 93, 4, 0.3);
      border-radius: 999px;
      padding: 0.5rem 1.25rem;
      font-size: 0.85rem;
      color: #f48c06;
      margin-bottom: 2rem;
    }

    .dot {
      width: 8px; height: 8px;
      background: #e85d04;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    button {
      background: #e85d04;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 0.9rem 2rem;
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
    }

    button:hover { background: #f48c06; transform: scale(1.04); }
    button:active { transform: scale(0.97); }

    .tip {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: #5c3d1a;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="emoji">🍱</div>
  <h1>Sem conexão</h1>
  <p>Parece que você está offline. Conecte-se à internet para ver o cardápio e fazer seu pedido.</p>

  <div class="status">
    <div class="dot"></div>
    Aguardando conexão...
  </div>

  <button onclick="tentarNovamente()">↻ Tentar novamente</button>

  <p class="tip">O app voltará automaticamente quando a internet retornar 🙌</p>

  <script>
    function tentarNovamente() {
      window.location.href = '/';
    }

    // Redireciona automaticamente quando voltar a internet
    window.addEventListener('online', () => {
      setTimeout(() => { window.location.href = '/'; }, 500);
    });
  </script>
</body>
</html>
